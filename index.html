<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horror Snake</title>

<style>
:root{
    --glass: rgba(255,255,255,.08);
    --border: rgba(255,255,255,.12);
    --cyan: #00e5ff;
    --red: #ff4d6d;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    overflow:hidden;
    height:100vh;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,229,255,.15), transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(255,77,109,.10), transparent 35%),
        linear-gradient(135deg,#04070d,#0b1020,#05070f);

    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.08;
    background:
        repeating-linear-gradient(
            0deg,
            transparent 0px,
            transparent 2px,
            white 3px
        );
    animation: noise 8s linear infinite;
}

@keyframes noise{
    from{transform:translateY(0);}
    to{transform:translateY(100px);}
}

.panel{
    position:relative;

    padding:24px;

    border-radius:30px;

    background:var(--glass);

    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);

    border:1px solid var(--border);

    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.1);
}

.title{
    text-align:center;
    color:white;
    font-size:32px;
    letter-spacing:5px;
    margin-bottom:12px;
}

.subtitle{
    text-align:center;
    color:#9ca3af;
    margin-bottom:16px;
}

.stats{
    display:flex;
    justify-content:space-between;
    color:white;
    margin-bottom:12px;
}

canvas{
    border-radius:20px;
    border:1px solid rgba(255,255,255,.08);
}

.overlay{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:12px;

    border-radius:30px;

    background:rgba(0,0,0,.75);

    color:white;
}

.overlay button{
    border:none;
    cursor:pointer;

    padding:12px 20px;

    border-radius:12px;

    background:var(--cyan);
    color:black;
    font-weight:bold;
}

.footer{
    margin-top:12px;
    text-align:center;
    color:#9ca3af;
    font-size:13px;
}
</style>
</head>
<body>

<div class="panel">

    <div class="title">HORROR SNAKE</div>
    <div class="subtitle">WASD или стрелки</div>

    <div class="stats">
        <div>Очки: <span id="score">0</span></div>
        <div>Рекорд: <span id="best">0</span></div>
    </div>

    <canvas id="game" width="600" height="600"></canvas>

    <div class="footer">
        Неоновая хоррор-змейка
    </div>

    <div class="overlay" id="gameOver">
        <h1>GAME OVER</h1>
        <p>Змейка столкнулась сама с собой</p>
        <button onclick="restart()">Играть снова</button>
    </div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const CELL = 30;
const GRID = 20;

let snake;
let food;
let dirX;
let dirY;
let score;
let best = Number(localStorage.getItem("snakeBest") || 0);

document.getElementById("best").textContent = best;

function resetGame(){

    snake = [
        {x:10,y:10}
    ];

    food = randomFood();

    dirX = 1;
    dirY = 0;

    score = 0;

    document.getElementById("score").textContent = 0;
}

function randomFood(){

    return {
        x:Math.floor(Math.random()*GRID),
        y:Math.floor(Math.random()*GRID)
    };
}

resetGame();

document.addEventListener("keydown",(e)=>{

    switch(e.code){

        case "KeyW":
        case "ArrowUp":

            if(dirY===0){
                dirX=0;
                dirY=-1;
            }
            break;

        case "KeyS":
        case "ArrowDown":

            if(dirY===0){
                dirX=0;
                dirY=1;
            }
            break;

        case "KeyA":
        case "ArrowLeft":

            if(dirX===0){
                dirX=-1;
                dirY=0;
            }
            break;

        case "KeyD":
        case "ArrowRight":

            if(dirX===0){
                dirX=1;
                dirY=0;
            }
            break;
    }
});

let lastMove = 0;
const SPEED = 100;
let running = true;

function move(){

    const head = {
        x:snake[0].x + dirX,
        y:snake[0].y + dirY
    };

    if(head.x < 0) head.x = GRID - 1;
    if(head.x >= GRID) head.x = 0;

    if(head.y < 0) head.y = GRID - 1;
    if(head.y >= GRID) head.y = 0;

    for(let i=1;i<snake.length;i++){

        if(
            head.x === snake[i].x &&
            head.y === snake[i].y
        ){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if(
        head.x === food.x &&
        head.y === food.y
    ){

        score++;

        document.getElementById("score")
        .textContent = score;

        if(score > best){

            best = score;

            localStorage.setItem(
                "snakeBest",
                best
            );

            document.getElementById("best")
            .textContent = best;
        }

        food = randomFood();

    }else{

        snake.pop();
    }
}

function drawFood(){

    const pulse =
        Math.sin(Date.now()*0.01);

    ctx.beginPath();

    ctx.fillStyle = "#ff4d6d";

    ctx.shadowBlur = 25;
    ctx.shadowColor = "#ff4d6d";

    ctx.arc(
        food.x*CELL + CELL/2,
        food.y*CELL + CELL/2,
        CELL/3 + pulse,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.shadowBlur = 0;
}

function drawSnake(){

    snake.forEach((part,index)=>{

        const x = part.x * CELL;
        const y = part.y * CELL;

        const g =
            ctx.createLinearGradient(
                x,y,
                x+CELL,y+CELL
            );

        g.addColorStop(0,"#c8ffff");
        g.addColorStop(1,"#00e5ff");

        ctx.fillStyle = g;

        ctx.shadowBlur =
            index === 0 ? 30 : 10;

        ctx.shadowColor = "#00e5ff";

        ctx.beginPath();

        ctx.roundRect(
            x+2,
            y+2,
            CELL-4,
            CELL-4,
            12
        );

        ctx.fill();
    });

    ctx.shadowBlur = 0;
}

function drawGrid(){

    ctx.strokeStyle =
        "rgba(255,255,255,.03)";

    for(let i=0;i<=GRID;i++){

        ctx.beginPath();
        ctx.moveTo(i*CELL,0);
        ctx.lineTo(i*CELL,canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i*CELL);
        ctx.lineTo(canvas.width,i*CELL);
        ctx.stroke();
    }
}

function render(time){

    if(running && time-lastMove>SPEED){

        move();

        lastMove=time;
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawGrid();
    drawFood();
    drawSnake();

    requestAnimationFrame(render);
}

function gameOver(){

    running = false;

    document
    .getElementById("gameOver")
    .style.display = "flex";
}

function restart(){

    running = true;

    document
    .getElementById("gameOver")
    .style.display = "none";

    resetGame();
}

requestAnimationFrame(render);

</script>

</body>
</html>
