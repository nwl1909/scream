<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Modern</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
    font-size:2rem;
    letter-spacing:2px;
}

canvas{
    border-radius:20px;
    background:#111827;
    box-shadow:
        0 0 30px rgba(0,255,255,.15),
        0 0 60px rgba(0,255,255,.1);
}

.score{
    color:white;
    margin-top:15px;
    font-size:1.2rem;
}

#screamer{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
    z-index:9999;
}
</style>
</head>
<body>

<div class="container">
    <h1>SNAKE</h1>
    <canvas id="game" width="600" height="600"></canvas>
    <div class="score">Очки: <span id="score">0</span></div>
</div>

<img id="screamer" src="screamer-fnaf.gif" alt="Screamer">

<audio id="scream">
    <source src="five-nights-at-freddys-2-full-scream-sound.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 30;
const size = 20;

let snake = [
    {x:10,y:10}
];

let food = {
    x:Math.floor(Math.random()*size),
    y:Math.floor(Math.random()*size)
};

let dx = 1;
let dy = 0;
let score = 0;

document.addEventListener("keydown", e => {
    if(e.key === "ArrowUp" && dy === 0){
        dx = 0; dy = -1;
    }
    if(e.key === "ArrowDown" && dy === 0){
        dx = 0; dy = 1;
    }
    if(e.key === "ArrowLeft" && dx === 0){
        dx = -1; dy = 0;
    }
    if(e.key === "ArrowRight" && dx === 0){
        dx = 1; dy = 0;
    }
});

function draw(){

    ctx.fillStyle = "#111827";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    snake.forEach((part,i)=>{
        ctx.fillStyle = i===0 ? "#22d3ee" : "#06b6d4";
        ctx.fillRect(part.x*box, part.y*box, box-2, box-2);
    });

    ctx.fillStyle = "#ef4444";
    ctx.beginPath();
    ctx.arc(
        food.x*box+box/2,
        food.y*box+box/2,
        box/2.5,
        0,
        Math.PI*2
    );
    ctx.fill();

    const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    if(head.x < 0) head.x = size-1;
    if(head.x >= size) head.x = 0;
    if(head.y < 0) head.y = size-1;
    if(head.y >= size) head.y = 0;

    if(head.x === food.x && head.y === food.y){
        score++;
        document.getElementById("score").textContent = score;

        food = {
            x:Math.floor(Math.random()*size),
            y:Math.floor(Math.random()*size)
        };
    }else{
        snake.pop();
    }

    snake.unshift(head);

    for(let i=1;i<snake.length;i++){
        if(
            head.x === snake[i].x &&
            head.y === snake[i].y
        ){
            snake = [{x:10,y:10}];
            score = 0;
            document.getElementById("score").textContent = score;
        }
    }
}

setInterval(draw,120);

// Скример через 20 секунд
setTimeout(() => {

    const img = document.getElementById("screamer");
    const audio = document.getElementById("scream");

    img.style.display = "block";

    audio.play().catch(() => {
        console.log("Браузер заблокировал автозапуск звука.");
    });

}, 20000);
</script>

</body>
</html>
