<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Современная Змейка</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e24;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .game-container {
            position: relative;
        }
        canvas {
            background-color: #2b2b36;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 255, 204, 0.2);
            display: block;
        }
        /* Стили для скримера */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
        }
        #screamer-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Изображение заполнит весь экран */
        }
    </style>
</head>
<body>

    <h1>СУПЕР ЗМЕЙКА</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div id="screamer-overlay">
        <img src="screamer-fnaf.gif" alt="screamer">
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 10, y: 10 }
        ];
        let food = { x: 15, y: 15 };
        
        let dx = 0;
        let dy = 0;
        let score = 0;

        // Игровой цикл
        function drawGame() {
            clearCanvas();
            moveSnake();
            checkCollision();
            drawFood();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = '#2b2b36';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Голова змейки чуть ярче
                ctx.fillStyle = index === 0 ? '#00ffcc' : '#00b38f';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                
                // Скругленные края для красоты (по желанию)
                ctx.strokeStyle = '#1e1e24';
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return; // Игра не началась пока не нажата кнопка

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Добавляем новую голову

            // Если змейка съела еду
            if (head.x === food.x && head.y === food.y) {
                score++;
                spawnFood();
            } else {
                snake.pop(); // Удаляем хвост, если не съели еду
            }
        }

        function drawFood() {
            ctx.fillStyle = '#ff3366'; // Современный розово-красный цвет для еды
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2, 
                food.y * gridSize + gridSize / 2, 
                gridSize / 2 - 2, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Проверка, чтобы еда не появилась на самой змейке
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                }
            });
        }

        function checkCollision() {
            const head = snake[0];

            // Столкновение со стенами
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                resetGame();
            }

            // Столкновение с самой собой
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    resetGame();
                }
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            spawnFood();
        }

        // Управление клавиатурой
        window.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                case 'ц':
                case 'Ц':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                case 'ы':
                case 'Ы':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                case 'ф':
                case 'Ф':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                case 'в':
                case 'В':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        // Запуск игры на 10 кадров в секунду
        setInterval(drawGame, 100);

        // ==========================================
        // ЛОГИКА СКРИМЕРА
        // ==========================================
        setTimeout(() => {
            const screamerDiv = document.getElementById('screamer-overlay');
            const jumpcareAudio = new Audio('five-nights-at-freddys-2-full-scream-sound.mp3');
            
            // Показываем гифку на весь экран
            screamerDiv.style.display = 'block';
            
            // Включаем звук (сработает, если игрок уже нажимал на кнопки)
            jumpcareAudio.play().catch(error => {
                console.warn('Автовоспроизведение заблокировано браузером. Пользователь должен был нажать хоть одну кнопку до скримера.');
            });

        }, 20000); // 20000 миллисекунд = 20 секунд

    </script>
</body>
</html>
