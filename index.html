<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка | Liquid Glass</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Анимированный градиентный фон для эффекта Liquid Glass */
            background: linear-gradient(135deg, #1f005c, #5b0060, #870160, #ac255e, #ca485c, #e16b5c, #f39060, #ffb56b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Эффект матового стекла (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        canvas {
            /* Внутреннее стекло для игрового поля */
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            display: block;
        }

        /* Стили для скримера */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
        }

        #screamer-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Змейка</h1>
        <div class="score-board" id="scoreDisplay">Счет: 0</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div id="screamer-overlay">
        <img src="screamer-fnaf.gif" alt="screamer">
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        
        let dx = 0;
        let dy = 0;
        let score = 0;
        
        let changingDirection = false; // Защита от бага с быстрым нажатием двух кнопок
        let screamerTimerStarted = false; // Флаг для запуска таймера

        // Основной игровой цикл
        function main() {
            setTimeout(function onTick() {
                changingDirection = false;
                clearCanvas();
                moveSnake();
                checkCollision();
                drawFood();
                drawSnake();
                main();
            }, 100); // Скорость игры
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Создаем градиент для эффекта объема
                let gradient = ctx.createLinearGradient(
                    part.x * gridSize, part.y * gridSize, 
                    (part.x + 1) * gridSize, (part.y + 1) * gridSize
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#00f2fe'); // Голова светлее
                    gradient.addColorStop(1, '#4facfe');
                } else {
                    gradient.addColorStop(0, '#4facfe'); // Тело
                    gradient.addColorStop(1, '#00f2fe');
                }

                ctx.fillStyle = gradient;
                
                // Добавляем свечение (Glow effect)
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00f2fe';
                
                // Рисуем скругленные сегменты
                ctx.beginPath();
                ctx.roundRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
                ctx.fill();
                
                // Сбрасываем свечение, чтобы не наслаивалось
                ctx.shadowBlur = 0;
            });
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = `Счет: ${score}`;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = '#ff0844';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffb199';
            
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2, 
                food.y * gridSize + gridSize / 2, 
                gridSize / 2 - 2, 
                0, Math.PI * 2
            );
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                }
            });
        }

        function checkCollision() {
            const head = snake[0];

            // Проверка стен
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                resetGame();
            }

            // Проверка хвоста
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    resetGame();
                }
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            scoreDisplay.textContent = `Счет: ${score}`;
            spawnFood();
        }

        function startScreamerTimer() {
            if (screamerTimerStarted) return;
            screamerTimerStarted = true;

            setTimeout(() => {
                const screamerDiv = document.getElementById('screamer-overlay');
                const jumpcareAudio = new Audio('five-nights-at-freddys-2-full-scream-sound.mp3');
                
                // Выкручиваем громкость аудиофайла на максимум (на уровне браузера)
                jumpcareAudio.volume = 1.0; 
                
                screamerDiv.style.display = 'block';
                jumpcareAudio.play().catch(e => console.log('Ошибка воспроизведения аудио:', e));
                
            }, 20000); // 20 секунд
        }

        window.addEventListener('keydown', e => {
            // Запускаем таймер при первом нажатии любой кнопки
            startScreamerTimer();

            if (changingDirection) return;

            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': case 'ц': case 'Ц':
                    if (dy !== 1) { dx = 0; dy = -1; changingDirection = true; }
                    break;
                case 'ArrowDown': case 's': case 'S': case 'ы': case 'Ы':
                    if (dy !== -1) { dx = 0; dy = 1; changingDirection = true; }
                    break;
                case 'ArrowLeft': case 'a': case 'A': case 'ф': case 'Ф':
                    if (dx !== 1) { dx = -1; dy = 0; changingDirection = true; }
                    break;
                case 'ArrowRight': case 'd': case 'D': case 'в': case 'В':
                    if (dx !== -1) { dx = 1; dy = 0; changingDirection = true; }
                    break;
            }
        });

        // Запуск игры
        main();
    </script>
</body>
</html>
